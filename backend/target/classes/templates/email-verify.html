<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 40px auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        .header { background: linear-gradient(135deg, #6366f1, #8b5cf6); padding: 32px; text-align: center; }
        .header h1 { color: #ffffff; margin: 0; font-size: 24px; }
        .body { padding: 32px; }
        .body p { color: #333; line-height: 1.6; margin: 0 0 16px; }
        .btn { display: inline-block; padding: 14px 32px; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #ffffff; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 16px; }
        .btn-container { text-align: center; margin: 24px 0; }
        .footer { text-align: center; padding: 24px; color: #999; font-size: 12px; border-top: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Verify Your Email</h1>
        </div>
        <div class="body">
            <p>Hi <strong th:text="${name}">User</strong>,</p>
            <p>Welcome to JobBoard! Please verify your email address by clicking the button below:</p>
            <div class="btn-container">
                <a class="btn" th:href="${verifyLink}">Verify Email</a>
            </div>
            <p>This link will expire in <strong>24 hours</strong>.</p>
            <p>If you did not create an account, please ignore this email.</p>
        </div>
        <div class="footer">
            <p>&copy; 2024 JobBoard. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
